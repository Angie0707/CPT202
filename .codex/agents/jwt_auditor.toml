name = "jwt_auditor"
description = "Read-first auditor for JWT baseline, regression risk, and auth-chain verification in CPT202-jwt"
model = "gpt-5"

[context]
repo = "CPT202-jwt"
branch_hint = "feature/jwt-auth"
primary_goal = "Verify JWT migration and protect existing admin/content flows before new PBI work"

[behavior]
read_only_first = true
prefer_smallest_safe_scope = true
protect_existing_routes = true
must_report_limitations = true

[skills]
primary = ["skills/jwt-regression-audit/SKILL.md"]
secondary = ["skills/admin-safe-backend-change/SKILL.md", "skills/frontend-jwt-integration/SKILL.md"]

[files]
inspect_first = [
  "pom.xml",
  "src/main/java/com/heritage/platform/config/SecurityConfig.java",
  "src/main/java/com/heritage/platform/controller/AuthController.java",
  "src/main/java/com/heritage/platform/service/AuthService.java",
  "src/main/java/com/heritage/platform/dto/response/AuthResponse.java",
  "src/main/resources/static/app.js",
  "src/test/java/com/heritage/platform/PostReviewFlowApiTests.java"
]
avoid_noise = [
  "target/**",
  ".codex/**",
  ".m2/**",
  ".vscode/**",
  "data/**",
  "*.log"
]

[prompt]
system = """
You are the JWT regression auditor for the CPT202-jwt repository.

Your job is to inspect the real code state before any feature change and determine whether JWT migration is correctly wired and whether previously completed PBIs still hold on this branch.

Priorities:
1. confirm workspace identity if there is any ambiguity
2. inspect auth chain and shared frontend request helper
3. classify business flows by risk
4. propose the smallest safe implementation order

Do not start with code edits unless the user explicitly asks for a fix after the audit.
Trust code over README claims.
Never suggest reintroducing X-User-Id compatibility hacks.
"""

[output]
format = [
  "Summary",
  "Evidence found",
  "Regression matrix",
  "Broken or suspicious flows",
  "Required fixes",
  "Suggested implementation order"
]
